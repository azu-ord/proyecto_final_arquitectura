AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploys a Streamlit application on ECS Fargate with an Application Load Balancer.
  Creates all required resources in a single stack: IAM roles, ECS cluster,
  task definition, service, ALB, and security groups. HTTP on port 80.

  Deploy with:
    aws cloudformation deploy \
      --template-file ecs-fargate-app.yaml \
      --stack-name  auto-repair-app \
      --capabilities CAPABILITY_NAMED_IAM \
      --parameter-overrides \
          VpcId=vpc-xxxxxxxx \
          SubnetIds="subnet-aaa,subnet-bbb,subnet-ccc" \
          ImageUri=123456789012.dkr.ecr.us-east-1.amazonaws.com/auto-repair-shop:latest \
          DBHostPrimary=itam-autoshop-956463123241.cmvsysimg4pq.us-east-1.rds.amazonaws.com \
          DBHostReplica=itam-autoshop-replica-956463123241.cmvsysimg4pq.us-east-1.rds.amazonaws.com \
          RDSSecurityGroupId=sg-xxxxxxxxxxxxxxxxx \
          SecretArn=arn:aws:secretsmanager:us-east-1:956463123241:secret:itam/rds/auto-repair-shop/credentials-tTDYL5 \
      --region us-east-1

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the application will be deployed.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the ALB and ECS tasks.
      Minimum 2 subnets in different AZs.

  ImageUri:
    Type: String
    Description: >
      Full ECR image URI.
      Example: 123456789012.dkr.ecr.us-east-1.amazonaws.com/auto-repair-shop:latest

  ServiceName:
    Type: String
    Default: auto-repair-shop
    MaxLength: 20
    Description: >
      Service name (max 20 characters). Used as a prefix for all resources:
      ECS, ALB (max 32), Target Group (max 32), IAM roles.

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of Fargate tasks to keep running.

  Cpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: CPU units for the Fargate task (256 = 0.25 vCPU).

  Memory:
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048', '4096', '8192']
    Description: Memory in MiB for the Fargate task.

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: CloudWatch log retention in days.

  # FIX 1: DB endpoints como parámetros, no hardcodeados
  DBHostPrimary:
    Type: String
    Description: RDS primary instance endpoint.

  DBHostReplica:
    Type: String
    Description: RDS read replica endpoint.

  # FIX 2: ARN del secreto de Secrets Manager para acotar permisos IAM
  SecretArn:
    Type: String
    Description: >
      Full ARN of the Secrets Manager secret containing RDS credentials.
      Example: arn:aws:secretsmanager:us-east-1:956463123241:secret:itam/rds/auto-repair-shop/credentials-tTDYL5

  # FIX 3: Security Group de RDS para acotar egress de ECS
  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID of the RDS instance. Used to scope ECS egress rule.

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ---------------------------------------------------------------------------
  # 1. IAM Roles
  # ---------------------------------------------------------------------------

  # Allows ECS Fargate to pull images from ECR, write logs to CloudWatch,
  # and inject secrets from Secrets Manager into the container at startup.
  # This is an infrastructure role — used by ECS, not by the app code.
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Resource acotado al ARN específico del secreto, no '*'
              # kms:Decrypt no necesario: aws/secretsmanager lo cubre AmazonECSTaskExecutionRolePolicy
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref SecretArn

  # Permissions for the app code running inside the container:
  # S3 for data, Athena/Glue for queries, Secrets Manager for RDS credentials.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StreamlitDataSciencePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - arn:aws:s3:::itam-final-azucena
                  - arn:aws:s3:::itam-final-azucena/*
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                  - athena:ListQueryExecutions
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetPartitions
                Resource: '*'
              # FIX 4 (también en TaskRole): acotado al ARN específico
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref SecretArn
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              # Bedrock: permite al agente Strands invocar modelos desde ECS
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - 'arn:aws:bedrock:*::foundation-model/anthropic.*'
                  - 'arn:aws:bedrock:*:*:inference-profile/us.anthropic.*'

  # ---------------------------------------------------------------------------
  # 2. ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ServiceName}-cluster'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: app
          Value: !Ref ServiceName

  # ---------------------------------------------------------------------------
  # 3. CloudWatch Log Group
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ServiceName}'
      RetentionInDays: !Ref LogRetentionDays

  # ---------------------------------------------------------------------------
  # 4. Security Groups
  #    - ALBSecurityGroup: allows HTTP (80) from the internet
  #    - ECSSecurityGroup: allows traffic from the ALB on port 8501
  #      Egress to RDS is scoped to the RDS Security Group (not 0.0.0.0/0)
  # ---------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB HTTP access for ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP from internet
      Tags:
        - Key: app
          Value: !Ref ServiceName

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ECS tasks access from ALB for ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Traffic from ALB to Streamlit port
      SecurityGroupEgress:
        # FIX 3: Egress a RDS acotado al Security Group de RDS, no a 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroupId
          Description: Outbound to RDS PostgreSQL (scoped to RDS SG)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: Outbound HTTPS to AWS APIs (S3, Athena, Secrets Manager)
      Tags:
        - Key: app
          Value: !Ref ServiceName

  # ---------------------------------------------------------------------------
  # 5. Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ServiceName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: app
          Value: !Ref ServiceName

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ServiceName}-tg'
      Protocol: HTTP
      Port: 8501
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: app
          Value: !Ref ServiceName

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------------------
  # 6. Task Definition
  # ---------------------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ServiceName
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: S3_BUCKET
              Value: itam-final-azucena
            - Name: GOLD_DB
              Value: autoshop_gold
            - Name: ATHENA_OUTPUT
              Value: s3://itam-final-azucena/athena-results/
            - Name: SECRET_NAME
              Value: itam/rds/auto-repair-shop/credentials
            # FIX 1: Endpoints de RDS desde parámetros, no hardcodeados
            - Name: DB_HOST_PRIMARY
              Value: !Ref DBHostPrimary
            - Name: DB_HOST_REPLICA
              Value: !Ref DBHostReplica
          # FIX 2: Credenciales inyectadas directamente desde Secrets Manager.
          # ECS las pone como variables de entorno dentro del contenedor en
          # tiempo de arranque — nunca aparecen en logs ni en docker inspect.
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${SecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${SecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8501/_stcore/health || exit 1
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60

  # ---------------------------------------------------------------------------
  # 7. ECS Service
  #    DependsOn: Listener — prevents ECS from registering tasks before the
  #    ALB is ready to receive health checks.
  # ---------------------------------------------------------------------------
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Ref ServiceName
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8501
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 120
      Tags:
        - Key: app
          Value: !Ref ServiceName

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  AppURL:
    Description: Public URL of the Streamlit application
    Value: !Sub 'http://${ALB.DNSName}'

  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ALB.DNSName

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  ECSSecurityGroupId:
    Description: >
      Security Group ID of the ECS tasks.
      Add this as an inbound rule in the RDS Security Group on port 5432.
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !Sub '${ServiceName}-ecs-sg-id'

  LogGroupName:
    Description: CloudWatch log group name
    Value: !Ref LogGroup