AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploys a minimal PostgreSQL 17 RDS instance for AutoShop Intelligence.
  Provisions the DB subnet group, security group, credentials in Secrets Manager,
  and a db.t3.micro instance (free-tier eligible).
  Designed to be accessed from SageMaker Studio in the same VPC.

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      VPC where RDS will be deployed. Must be the same VPC as the SageMaker
      Studio domain so Studio notebooks can reach port 5432.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      At least two private subnets in different Availability Zones. RDS requires
      a subnet group with subnets in at least two AZs even for single-AZ instances.

  DBName:
    Type: String
    Description: Name of the initial database to create inside the RDS instance.
    Default: autoshop_db

  DBUsername:
    Type: String
    Description: Master username for the PostgreSQL instance.
    Default: itam
    NoEcho: false

  DBPassword:
    Type: String
    Description: >
      Master password for the PostgreSQL instance. Stored in Secrets Manager —
      do not share or commit this value. Minimum 8 characters.
    MinLength: 8
    NoEcho: true

  SecretName:
    Type: String
    Description: >
      Secrets Manager secret name. Must match aws.secret_name in config.yaml.
    Default: itam/rds/auto-repair-shop/credentials

  CreateReadReplica:
    Type: String
    Description: >
      Set to true to provision a read replica (db.t3.micro) in the same VPC.
      Use the replica endpoint for ETL reads and the primary endpoint for writes.
      Recommended for production-like pipelines. Doubles hourly RDS cost (~$0.034/hr each).
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

# ─────────────────────────────────────────────────────────────────────────────
# CONDITIONS
# ─────────────────────────────────────────────────────────────────────────────
Conditions:

  EnableReadReplica: !Equals [!Ref CreateReadReplica, 'true']

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ───────────────────────────────────────────────────────────────────────────
  # SECRETS MANAGER — RDS CREDENTIALS
  #
  # Stores DB credentials so SageMaker notebooks retrieve them via boto3
  # instead of hard-coding passwords in notebooks or config files.
  # ───────────────────────────────────────────────────────────────────────────

  RdsCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Ref SecretName
      Description: Master credentials for AutoShop Intelligence RDS PostgreSQL instance.
      SecretString: !Sub |
        {
          "username": "${DBUsername}",
          "password": "${DBPassword}",
          "dbname":   "${DBName}",
          "port":     "5432",
          "engine":   "postgres"
        }

  # ───────────────────────────────────────────────────────────────────────────
  # NETWORKING — SECURITY GROUP
  #
  # SageMaker Studio uses PublicInternetOnly mode — kernel pods run in an
  # AWS-managed network without ENIs in the customer VPC. The instance must be
  # publicly accessible so notebooks can reach port 5432 over the internet.
  #
  # NOTE: acceptable for a course environment. For production use VpcOnly mode.
  # ───────────────────────────────────────────────────────────────────────────

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access from the internet (course demo)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: PostgreSQL public access for SageMaker PublicInternetOnly mode

  # ───────────────────────────────────────────────────────────────────────────
  # RDS SUBNET GROUP
  # ───────────────────────────────────────────────────────────────────────────

  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for AutoShop Intelligence RDS instance
      SubnetIds: !Ref SubnetIds

  # ───────────────────────────────────────────────────────────────────────────
  # RDS INSTANCE — db.t3.micro / PostgreSQL 17
  #
  # Tables created by NB04 (notebooks/04_rds_setup.ipynb):
  #   - vehicles          (catálogo de vehículos)
  #   - risk_scores       (scores pre-computados por NB03)
  #   - service_catalog   (conocimiento para el agente de Daniel)
  #   - maintenance_records (registros escritos por el agente)
  #   - model_run_log     (metadata de ejecuciones del modelo)
  # ───────────────────────────────────────────────────────────────────────────

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub 'itam-autoshop-${AWS::AccountId}'
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '17.4'
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: '20'
      StorageType: gp3
      MultiAZ: false
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 1
      StorageEncrypted: true
      AutoMinorVersionUpgrade: true

  # ───────────────────────────────────────────────────────────────────────────
  # READ REPLICA (OPTIONAL — default: true)
  #
  # Patrón recomendado para pipelines robustos:
  #   - Réplica: lecturas ETL (NB03 read-back, Streamlit dashboard)
  #   - Primaria: escrituras (NB03 batch insert, agente Daniel)
  #
  # Replicación asíncrona PostgreSQL — lag típico < 1s, aceptable para ETL batch.
  # ───────────────────────────────────────────────────────────────────────────

  RdsReadReplica:
    Type: AWS::RDS::DBInstance
    Condition: EnableReadReplica
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub 'itam-autoshop-replica-${AWS::AccountId}'
      DBInstanceClass: db.t3.micro
      SourceDBInstanceIdentifier: !Ref RdsInstance
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      AutoMinorVersionUpgrade: true

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  RdsEndpoint:
    Description: >
      Hostname para usar en config.yaml (rds.host) y en la connection string.
    Value: !GetAtt RdsInstance.Endpoint.Address

  RdsPort:
    Description: PostgreSQL port (always 5432).
    Value: !GetAtt RdsInstance.Endpoint.Port

  RdsSecretArn:
    Description: ARN del secret en Secrets Manager con las credenciales.
    Value: !Ref RdsCredentialsSecret

  RdsSecretName:
    Description: Nombre del secret (debe coincidir con aws.secret_name en config.yaml).
    Value: !Ref SecretName

  RdsInstanceId:
    Description: RDS instance identifier.
    Value: !Ref RdsInstance

  ConnectionString:
    Description: >
      SQLAlchemy connection string (reemplazar <password> con el valor de Secrets Manager).
    Value: !Sub 'postgresql+psycopg2://${DBUsername}:<password>@${RdsInstance.Endpoint.Address}:5432/${DBName}'

  RdsReplicaEndpoint:
    Condition: EnableReadReplica
    Description: >
      Endpoint de la réplica de lectura. Usar para ETL reads y Streamlit dashboard.
    Value: !GetAtt RdsReadReplica.Endpoint.Address

  RdsReplicaPort:
    Condition: EnableReadReplica
    Description: PostgreSQL port de la réplica (always 5432).
    Value: !GetAtt RdsReadReplica.Endpoint.Port

  ReplicaConnectionString:
    Condition: EnableReadReplica
    Description: >
      SQLAlchemy connection string para la réplica de lectura.
    Value: !Sub 'postgresql+psycopg2://${DBUsername}:<password>@${RdsReadReplica.Endpoint.Address}:5432/${DBName}'
